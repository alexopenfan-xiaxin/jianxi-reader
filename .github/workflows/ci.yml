name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - test

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Format, analyze, and test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: 3.44.0
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get --enforce-lockfile

      - name: Verify formatting
        id: formatting
        run: |
          dart format lib test
          git diff --binary -- lib test > formatting.patch
          git diff --exit-code -- lib test

      - name: Upload formatting patch
        if: failure() && steps.formatting.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: formatting-patch
          path: formatting.patch
          retention-days: 1

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Test
        run: flutter test --reporter expanded
