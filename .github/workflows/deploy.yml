name: Release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (default test)'
        required: false
        default: 'test'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-upload:
    name: Build APK and upload to update server
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Check out repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          ref: ${{ github.event.inputs.ref || 'test' }}

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: 3.44.0
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get --enforce-lockfile

      - name: Read version info
        id: version
        run: |
          LINE=$(grep -E '^version:' pubspec.yaml | head -1)
          VERSION_STR=$(echo "$LINE" | sed -E 's/^version:[[:space:]]*//')
          VERSION_NAME=$(echo "$VERSION_STR" | cut -d '+' -f 1)
          BUILD_NUMBER=$(echo "$VERSION_STR" | cut -d '+' -f 2)
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "version_str=$VERSION_STR" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION_STR (name=$VERSION_NAME, build=$BUILD_NUMBER)"

      - name: Configure release signing
        env:
          KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE }}
          STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > android/app/release-keystore.jks
            {
              echo "storePassword=$STORE_PASSWORD"
              echo "keyPassword=$KEY_PASSWORD"
              echo "keyAlias=$KEY_ALIAS"
              echo "storeFile=app/release-keystore.jks"
            } > android/key.properties
            echo "Release signing configured."
          else
            echo "::warning::RELEASE_KEYSTORE secret not set, APK will use debug key."
          fi

      - name: Build release APK (arm64)
        run: |
          flutter build apk --release \
            --target-platform android-arm64 \
            --android-skip-build-dependency-validation

      - name: Rename APK to arm64-v8a convention
        run: |
          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/app-release.apk \
            artifacts/app-arm64-v8a-release.apk
          ls -lh artifacts/

      - name: Upload APK artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: app-arm64-v8a-release
          path: artifacts/app-arm64-v8a-release.apk
          retention-days: 14

      - name: Upload to update server
        env:
          BUILD_NUMBER: ${{ steps.version.outputs.build_number }}
          UPDATE_KEY: ${{ secrets.UPDATE_SERVER_KEY }}
        run: |
          if [ -z "$UPDATE_KEY" ]; then
            echo "::error::Secret UPDATE_SERVER_KEY is not set."
            exit 1
          fi
          echo "Uploading APK with version (build number) = $BUILD_NUMBER ..."
          RESPONSE=$(curl -sS -X POST \
            -F "apk=@artifacts/app-arm64-v8a-release.apk" \
            -F "version=$BUILD_NUMBER" \
            "https://alexxia.5imh.xyz/update/index.php?push&key=$UPDATE_KEY" \
            --insecure \
            --connect-timeout 30 \
            --max-time 600 \
            -w "\nHTTP_STATUS:%{http_code}")
          HTTP_CODE=$(echo "$RESPONSE" | grep -oE 'HTTP_STATUS:[0-9]+' | cut -d ':' -f 2)
          BODY=$(echo "$RESPONSE" | sed -E 's/HTTP_STATUS:[0-9]+$//')
          echo "HTTP status: $HTTP_CODE"
          echo "Response body: $BODY"
          if [ "$HTTP_CODE" != "200" ] || ! echo "$BODY" | grep -q '"success"[[:space:]]*:[[:space:]]*true'; then
            echo "::error::Upload failed. HTTP=$HTTP_CODE, body=$BODY"
            exit 1
          fi
          echo "Upload succeeded."

      - name: Create git tag
        env:
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
          BUILD_NUMBER: ${{ steps.version.outputs.build_number }}
        run: |
          TAG="v${VERSION_NAME}+${BUILD_NUMBER}"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists, skipping tag creation."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "v$VERSION_NAME+$BUILD_NUMBER (build $BUILD_NUMBER)"
            git push origin "$TAG"
            echo "Created and pushed tag $TAG"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
          BUILD_NUMBER: ${{ steps.version.outputs.build_number }}
        run: |
          TAG="v${VERSION_NAME}+${BUILD_NUMBER}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping."
          else
            echo "Creating release $TAG ..."
            gh release create "$TAG" \
              --title "v$VERSION_NAME+$BUILD_NUMBER" \
              --generate-notes \
              artifacts/app-arm64-v8a-release.apk
            echo "Release $TAG created."
          fi

      - name: Sync test to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main --no-tags
          git push --force origin HEAD:main
          echo "Pushed HEAD to main."
