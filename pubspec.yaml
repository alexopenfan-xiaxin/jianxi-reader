name: jianxi_reader
description: "A quiet mobile reader for Markdown and HTML documents."
publish_to: 'none'

version: 2.8.10+190

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  app_links: ^6.4.1
  file_picker: 10.3.8
  flutter_smooth_markdown: ^0.7.2
  flutter_highlight: ^0.7.0
  flutter_svg: ^2.2.3
  highlight: ^0.7.0
  path: ^1.9.1
  package_info_plus: ^8.3.1
  path_provider: ^2.1.5
  provider: ^6.1.5+1
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.1
  webview_flutter: ^4.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/emoji.json
  fonts:
    - family: LXGWWenKai
      fonts:
        - asset: assets/fonts/LXGWWenKai-Regular.ttf
